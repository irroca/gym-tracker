<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#111418">
    <title>健身打卡计划</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon-192.png">
</head>
<body>
    <div id="app" class="app-container">
        <header class="app-header glassmorphism">
            <h1 id="header-title">今日</h1>
            <div id="header-date" class="header-subtitle">加载中…</div>
        </header>

        <main id="main-content" class="main-scrollable"></main>

        <nav class="bottom-nav glassmorphism" aria-label="主导航">
            <button class="nav-item active" data-tab="today" type="button">
                <i data-lucide="check-square"></i>
                <span>今日</span>
            </button>
            <button class="nav-item" data-tab="plan" type="button">
                <i data-lucide="book-open"></i>
                <span>总计划</span>
            </button>
            <button class="nav-item" data-tab="profile" type="button">
                <i data-lucide="user"></i>
                <span>我的</span>
            </button>
        </nav>
    </div>

    <script src="lucide.min.js"></script>
    <script type="module" src="app.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            const isLocalPreview = ['localhost', '127.0.0.1', '::1'].includes(window.location.hostname);

            window.addEventListener('load', async () => {
                if (isLocalPreview) {
                    const registrations = await navigator.serviceWorker.getRegistrations();
                    await Promise.all(registrations.map((registration) => registration.unregister()));

                    if ('caches' in window) {
                        const keys = await window.caches.keys();
                        await Promise.all(
                            keys
                                .filter((key) => key.startsWith('gymtracker-'))
                                .map((key) => window.caches.delete(key))
                        );
                    }
                    return;
                }

                navigator.serviceWorker.register('./sw.js').catch((error) => {
                    console.log('SW registration failed:', error);
                });
            });
        }
    </script>
</body>
</html>
