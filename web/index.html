<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <!-- Viewport settings specifically tuned for PWA / Mobile App feel -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <!-- PWA Meta Tags -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#121212">
    
    <title>GymTracker</title>
    
    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Custom Styles -->
    <link rel="stylesheet" href="style.css">
    
    <!-- Manifest for PWA -->
    <link rel="manifest" href="manifest.json">
</head>
<body>
    <!-- App Container -->
    <div id="app" class="app-container">
        
        <!-- HEADER -->
        <header class="app-header glassmorphism">
            <h1 id="header-title">Today</h1>
            <div id="header-date" class="header-subtitle">Loading...</div>
        </header>

        <!-- MAIN CONTENT AREA -->
        <main id="main-content" class="main-scrollable">
            <!-- Content will be injected here by app.js -->
        </main>

        <!-- BOTTOM NAVIGATION -->
        <nav class="bottom-nav glassmorphism">
            <button class="nav-item active" data-tab="today">
                <i data-lucide="check-square"></i>
                <span>Today</span>
            </button>
            <button class="nav-item" data-tab="plan">
                <i data-lucide="book-open"></i>
                <span>Plan</span>
            </button>
            <button class="nav-item" data-tab="profile">
                <i data-lucide="user"></i>
                <span>Profile</span>
            </button>
        </nav>
    </div>

    <!-- Scripts -->
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- Data and App Logic -->
    <script src="data.js"></script>
    <script src="app.js"></script>
    
    <!-- Service Worker Registration -->
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js').catch(err => {
                    console.log('SW registration failed:', err);
                });
            });
        }
    </script>
</body>
</html>
